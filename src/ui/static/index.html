<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-layout">

    <!-- ── Sidebar ────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New chat
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
          Knowledge base
        </div>
        <div class="stats-card" id="statsCard">
          <div class="stats-placeholder">Loading…</div>
        </div>
        <button class="refresh-btn" id="refreshBtn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Import documents
        </div>
        <label class="upload-area" id="dropZone">
          <input type="file" id="fileInput" accept=".pdf" multiple>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          <span class="upload-text">Drop PDFs here</span>
          <span class="upload-hint">or click to browse</span>
        </label>
        <div class="upload-status" id="uploadStatus"></div>
      </div>
    </aside>

    <!-- ── Main chat area ────────────────────────────────── -->
    <main class="chat-main">

      <div class="messages-scroll" id="messagesScroll">
        <!-- Welcome / empty state -->
        <div class="welcome-state" id="welcomeState">
          <div class="welcome-icon">
            <img src="/assets/bot.svg" alt="Assistant" width="56" height="56">
          </div>
          <h1 class="welcome-title">How can I help you?</h1>
          <p class="welcome-sub">Ask anything about your indexed documentation — APIs, webhooks, billing, subscriptions and more.</p>
          <div class="suggestions">
            <button class="suggestion" data-text="How do I create a payment intent?">
              Create a payment intent
            </button>
            <button class="suggestion" data-text="How do I set up and verify webhooks?">
              Set up webhooks
            </button>
            <button class="suggestion" data-text="How do I handle refunds?">
              Handle refunds
            </button>
            <button class="suggestion" data-text="How do I create a recurring subscription?">
              Create a subscription
            </button>
          </div>
        </div>

        <!-- Messages injected by JS -->
        <div class="messages" id="messages"></div>
      </div>

      <!-- Input bar -->
      <div class="input-area">
        <div class="input-box" id="inputBox">
          <textarea
            id="messageInput"
            placeholder="Send a message…"
            rows="1"
            autofocus
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled title="Send">
            <svg id="sendIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
